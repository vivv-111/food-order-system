server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: food-order-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/restaurant_menu_v2?useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:change-this-to-a-very-long-secret-key-please}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}

aws:
  region: ${AWS_REGION:ap-east-1}
  s3:
    bucket: ${AWS_S3_BUCKET:replace-me}
