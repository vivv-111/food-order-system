<!doctype html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin</title>
	<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
	<main class="container">
		<h1>Admin Console</h1>
		<p id="user-label"></p>

		<div class="row nav-row">
			<button id="logout-btn" type="button">Logout</button>
		</div>

		<p id="message"></p>

		<section class="card">
			<h3>Add Menu Item</h3>
			<form id="add-menu-form" class="grid-form">
				<label>Name</label>
				<input name="name" required>

				<label>Type</label>
				<select name="type" required>
					<option value="fried_noodles">fried_noodles</option>
					<option value="fried_rice">fried_rice</option>
					<option value="soup_noodles">soup_noodles</option>
					<option value="curry">curry</option>
					<option value="toast">toast</option>
					<option value="hamberger">hamberger</option>
					<option value="sandwich">sandwich</option>
					<option value="desserts">desserts</option>
				</select>

				<label>Ingredients</label>
				<input name="ingredients">

				<label>Description</label>
				<input name="description">

				<label>Price</label>
				<input name="price" type="number" step="0.01" min="0.01" required>

				<label>Image URL</label>
				<input name="imageUrl" placeholder="https://example.com/item.jpg">

				<button type="submit">Create Menu Item</button>
			</form>
		</section>

		<section class="card">
			<div class="menu-header">
				<h3>All Orders</h3>
				<button id="refresh-orders-btn" type="button">Refresh</button>
			</div>
			<section id="admin-orders" class="menu-grid"></section>
		</section>
	</main>

	<script type="module" src="assets/js/pages/admin.js"></script>
</body>
</html>
